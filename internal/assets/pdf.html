<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/assets/theme.css">
</head>
<body class="pdf-mode">
  <main id="pdf-root"
        data-file="{{.FileURL}}"
        data-worker="/assets/vendor/pdfjs/pdf.worker.min.mjs">
    <div id="pdf-status">Loading…</div>
    <div id="pdf-pages"></div>
  </main>
  <div id="toast" hidden></div>
  <script type="module" src="/assets/pdf.js"></script>
</body>
</html>
